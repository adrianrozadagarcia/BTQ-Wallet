name: Build & Release

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ── Windows ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-2019        # Windows Server 2019 → binary runs on Win 7 SP1+
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'  # lowest supported; runs on Win 7 SP1+

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller BTQWallet.spec --clean --noconfirm

      - name: Rename output
        run: mv dist/BTQWallet.exe dist/BTQWallet-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BTQWallet-windows
          path: dist/BTQWallet-windows.exe

  # ── Linux ──────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-20.04        # glibc 2.31 → binary runs on Ubuntu 20.04+, Debian 11+
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install system Qt libs
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxkbcommon-x11-0

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller BTQWallet.spec --clean --noconfirm

      - name: Rename output
        run: mv dist/BTQWallet dist/BTQWallet-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BTQWallet-linux
          path: dist/BTQWallet-linux

  # ── macOS ──────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-13            # macOS 13 Ventura runner
    env:
      MACOSX_DEPLOYMENT_TARGET: '10.13'   # binary runs on macOS 10.13 High Sierra+
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller BTQWallet.spec --clean --noconfirm

      - name: Rename output
        run: mv dist/BTQWallet dist/BTQWallet-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BTQWallet-macos
          path: dist/BTQWallet-macos

  # ── Create GitHub Release ──────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "BTQ Wallet ${{ github.ref_name }}"
          body: |
            ## BTQ Wallet ${{ github.ref_name }}

            ### Download

            | Platform | File | Minimum version |
            |---|---|---|
            | Windows | `BTQWallet-windows.exe` | Windows 7 SP1+ |
            | Linux | `BTQWallet-linux` | Ubuntu 20.04 / Debian 11 / Fedora 34+ |
            | macOS | `BTQWallet-macos` | macOS 10.13 High Sierra+ |

            **No Python or dependencies required** — just download and run.

            > Linux/macOS: `chmod +x BTQWallet-linux && ./BTQWallet-linux`

            ---
            See [README](https://github.com/adrianrozadagarcia/BTQ-Wallet#readme) for node setup instructions.
          files: |
            artifacts/BTQWallet-windows/BTQWallet-windows.exe
            artifacts/BTQWallet-linux/BTQWallet-linux
            artifacts/BTQWallet-macos/BTQWallet-macos
          draft: false
          prerelease: false
